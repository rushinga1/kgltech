<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kigali Tech Store is a Rwanda-inspired gadget shop for discovering the latest electronics in Kigali."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
    <title>Kigali Tech Store | Premium Gadgets</title>
    <script>
      // Brute-force theme initialization
      (function() {
        const theme = localStorage.getItem('kt-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (!theme && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
